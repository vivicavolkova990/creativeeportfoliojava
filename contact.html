<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="utf-8">
    <meta name="author" content="Волкова Вікторія Григорівна">
    <meta name="description" content="Мій перший вебсайт-портфоліо">
    <meta name="keywords" content="Перший вебсайт, веброзробник початківець, вебпортфоліо, креативне портфоліо">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <p>Завантаження...</p>
    </div>
    <header>
        <span class="logo">MyCreativePortfolio</span>
        <nav>
            <a href="index.html" class="firstbutton">Головна сторінка</a>
            <a href="portfolio.html" class="secondbutton">Портфоліо</a>
            <a href="blog.html" class="thirdbutton">Блог</a>
            <a href="contact.html" class="fourthbutton">Зворотний зв'язок</a>
            <button id="themeToggle" class="btn btn-warning btn-sm ms-3">Темна тема</button>
        </nav>
    </header>
    <section class="contact-section">
        <h1>Зв'яжіться зі мною</h1>
        <div class="contact-card">
            <form id="contactForm" onsubmit="return validateForm()">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Ім'я *</label>
                        <input type="text" class="form-control" id="name" required>
                        <div class="error-message" id="nameError"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" required>
                        <div class="error-message" id="emailError"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Тема</label>
                    <select class="form-control" id="topic">
                        <option>Загальне питання</option>
                        <option>Співпраця</option>
                        <option>Консультація</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Повідомлення *</label>
                    <textarea class="form-control" id="message" rows="4" onkeyup="countCharacters()" required></textarea>
                    <small id="charCount" class="text-muted">0 символів</small>
                    <div class="error-message" id="messageError"></div>
                </div>
                <button type="submit" class="btn btn-primary">Надіслати</button>
            </form>
            <div id="successMessage" class="alert alert-success mt-3" style="display:none;">
                Дякуємо! Ваше повідомлення надіслано.
            </div>
        </div>
    </section>

    <footer>
    <p class="copyright">&copy; 2026 MyCreativePortfolio</p>
    <p class="links"><a href="https://ua.linkedin.com/in/viktoria-volkova-a5588b3b1">LinkedIn</a></p>
    <p class="links"><a href="https://github.com/vivicavolkova990">GitHub</a></p>
    </footer>
    <button id="scrollTopBtn" class="scroll-top-btn" title="Прокрутити нагору">↑</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
